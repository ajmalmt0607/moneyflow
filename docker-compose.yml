services:

  moneyflow_backend:
    build: .
    container_name: moneyflow_backend

    ports:
      - "8020:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - moneyflow_db

  moneyflow_db:
    image: postgres:16
    container_name: moneyflow_db

    env_file:
      - .env

    ports:
      - "5450:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: